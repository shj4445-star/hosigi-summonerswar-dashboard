<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>호식이두마리치킨 × 서머너즈워 운영 현황</title>
  <style>
    :root{--ink:#17231f;--paper:#f5f1e8;--line:#d9d2c4;--coral:#ff765e;--lime:#c7e66c;--blue:#7bc9df;--amber:#f4c45e}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Pretendard,"Noto Sans KR",Arial,sans-serif}main{max-width:1440px;margin:auto;padding:0 38px 28px}.top{height:72px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);font-weight:800}.brand{display:flex;align-items:center;gap:12px}.mark{display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:var(--ink);color:white}.live{display:flex;align-items:center;gap:8px;font-size:13px}.live i{width:8px;height:8px;border-radius:50%;background:#72b248;box-shadow:0 0 0 4px #dcebc9}.hero{display:flex;justify-content:space-between;align-items:end;padding:54px 0 34px}.eyebrow{font-size:13px;font-weight:800;letter-spacing:.14em}.hero h1{font-size:clamp(42px,6vw,84px);line-height:.96;margin:12px 0}.hero em{color:var(--coral);font-style:normal}.sub{color:#58625e}.stamp{border:1px solid var(--ink);padding:16px 20px;min-width:210px}.stamp span,.stamp small{display:block;font-size:11px}.stamp strong{display:block;font-size:20px;margin:8px 0}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}.kpi{padding:20px;border:1px solid var(--ink);min-height:140px;display:flex;flex-direction:column}.kpi span{font-size:13px;font-weight:800}.kpi strong{font-size:36px;margin:auto 0 8px}.kpi small{color:#53605b}.coral{background:var(--coral)}.lime{background:var(--lime)}.blue{background:var(--blue)}.amber{background:var(--amber)}.panel{background:#fff;border:1px solid var(--ink)}.panel-head{display:flex;justify-content:space-between;align-items:center;padding:22px;border-bottom:1px solid var(--line)}.panel-head h2{margin:0;font-size:22px}.filters{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.filters button{border:1px solid var(--line);border-radius:20px;background:#fff;padding:7px 12px;cursor:pointer}.filters button.active{background:var(--ink);color:#fff;border-color:var(--ink)}.table-wrap{overflow:auto}table{border-collapse:separate;border-spacing:0;table-layout:fixed}th,td{padding:15px 16px;border-bottom:1px solid #e9e4da;text-align:right;font-size:14px}th{background:#f8f6f1;font-size:12px}th.group-head,th.label-head,td.label,td.group{text-align:left}.group-head,.group{position:sticky;left:0;width:130px;min-width:130px;z-index:4;background:#f8f6f1}.label-head,.label{position:sticky;left:130px;width:300px;min-width:300px;z-index:3;background:#fff}.label-head{background:#f8f6f1}.date-head,.date-cell{width:130px;min-width:130px}.total-head,.total-cell{position:sticky;right:110px;width:110px;min-width:110px;z-index:3;background:#fff}.average-head,.average-cell{position:sticky;right:0;width:110px;min-width:110px;z-index:3;background:#fff}.total-head,.average-head{z-index:5;background:#f8f6f1}.group{font-weight:800;vertical-align:top;background:#fbfaf7}.error{padding:28px;color:#a33}footer{display:flex;justify-content:space-between;padding:20px 0;font-size:12px;color:#69716e}@media(max-width:850px){main{padding:0 16px}.hero{align-items:start;flex-direction:column;gap:20px}.stamp{width:100%}.kpis{grid-template-columns:repeat(2,1fr)}.panel-head{align-items:flex-start;flex-direction:column;gap:14px}}@media(max-width:520px){.kpis{grid-template-columns:1fr}.hero h1{font-size:46px}.brand{font-size:12px}}
  </style>
</head>
<body><main>
  <header class="top"><div class="brand"><span class="mark">SW</span><span>SUMMONERS WAR × 호식이두마리치킨</span></div><div class="live"><i></i><span id="sync">구글 시트 자동 연동</span></div></header>
  <section class="hero"><div><p class="eyebrow">제휴 프로모션 운영 리포트</p><h1>한눈에 보는<br><em>운영 현황</em></h1><p class="sub">판매·쿠폰·회원가입·온라인 반응을 한 화면에서 확인하세요.</p></div><div class="stamp"><span>LAST UPDATE</span><strong id="updated">불러오는 중</strong><small>60초마다 자동 확인</small></div></section>
  <section class="kpis" id="kpis"></section>
  <section class="panel"><div class="panel-head"><h2>상세 운영 데이터</h2><nav class="filters" id="filters"></nav></div><div class="table-wrap" id="table"><div class="error">데이터를 불러오는 중입니다.</div></div></section>
  <footer><span>SUMMONERS WAR × 호식이두마리치킨 · OPERATIONS DASHBOARD</span><span>Google Sheets 실시간 연동</span></footer>
</main><script>
const SHEET='https://docs.google.com/spreadsheets/d/1g2JmZ7flSDaMq0rcxDodvPHRtRsPim4Z/gviz/tq?tqx=out:csv';let all=[],dates=[],active='전체';
function csv(s){let a=[],r=[],v='',q=false;for(let i=0;i<s.length;i++){let c=s[i];if(c==='"'){if(q&&s[i+1]==='"'){v+='"';i++}else q=!q}else if(c===','&&!q){r.push(v);v=''}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&s[i+1]==='\n')i++;r.push(v);if(r.some(x=>x!==''))a.push(r);r=[];v=''}else v+=c}r.push(v);if(r.some(x=>x!==''))a.push(r);return a}
function num(v){if(v==null||v==='')return null;let p=String(v).includes('%'),n=parseFloat(String(v).replace(/[,%]/g,''));return Number.isFinite(n)?(p?n/100:n):null}
function fmt(v,p){if(v==null)return '—';return p?(v*100).toFixed(1)+'%':v.toLocaleString('ko-KR',{maximumFractionDigits:1})}
function pick(words){return all.find(m=>words.some(w=>m.label.includes(w)))}
function render(){let sales=pick(['세트 판매']),coupon=pick(['쿠폰 사용률']),signup=pick(['회원가입자']),negative=pick(['부정 게시글']);let cards=[[sales?.total||0,'세트 누적 판매','건','coral'],[coupon?.average||0,'쿠폰 사용률','%','lime'],[signup?.total||0,'앱 회원가입자','명','blue'],[negative?.total||0,'부정 게시글','건','amber']];document.querySelector('#kpis').innerHTML=cards.map(([v,l,u,t])=>`<article class="kpi ${t}"><span>${l}</span><strong>${u==='%'?fmt(v,true):fmt(v,false)+u}</strong><small>구글 시트 기준</small></article>`).join('');let groups=['전체',...new Set(all.map(x=>x.group))];document.querySelector('#filters').innerHTML=groups.map(g=>`<button class="${g===active?'active':''}" data-g="${g}">${g}</button>`).join('');document.querySelectorAll('#filters button').forEach(b=>b.onclick=()=>{active=b.dataset.g;render()});let rows=active==='전체'?all:all.filter(x=>x.group===active);let counts={};rows.forEach(x=>counts[x.group]=(counts[x.group]||0)+1);let prev='';document.querySelector('#table').innerHTML=`<table style="width:${650+dates.length*130}px"><thead><tr><th class="group-head">구분</th><th class="label-head">항목</th>${dates.map(d=>`<th class="date-head">${d}</th>`).join('')}<th class="total-head">누적</th><th class="average-head">평균</th></tr></thead><tbody>${rows.map(m=>{let cell=m.group!==prev?`<td class="group" rowspan="${counts[m.group]}">${m.group}</td>`:'';prev=m.group;return `<tr>${cell}<td class="label">${m.label}</td>${m.values.map(v=>`<td class="date-cell">${fmt(v,m.percent)}</td>`).join('')}<td class="total-cell"><b>${fmt(m.total,m.percent)}</b></td><td class="average-cell">${fmt(m.average,m.percent)}</td></tr>`}).join('')}</tbody></table>`}
async function load(){try{let res=await fetch(SHEET+'&_='+Date.now(),{cache:'no-store'});if(!res.ok)throw 0;let rows=csv(await res.text()),head=rows[0]||[];let dateIdx=[];head.forEach((h,i)=>{if(/\d{1,2}\s*[/.월-]\s*\d{1,2}|\d{1,2}\/\d{1,2}/.test(h))dateIdx.push(i)});dateIdx=dateIdx.filter(i=>rows.slice(1).some(r=>r[i]!=null&&String(r[i]).trim()!==''));if(!dateIdx.length)dateIdx=head.map((_,i)=>i).filter(i=>i>=2&&rows.slice(1).some(r=>r[i]));dates=dateIdx.map(i=>head[i]);let group='기타';all=rows.slice(1).map(r=>{if(r[0])group=r[0];let vals=dateIdx.map(i=>num(r[i])),percent=dateIdx.some(i=>String(r[i]||'').includes('%'));let present=vals.filter(v=>v!=null);return{group,label:r[1]||'',values:vals,percent,total:present.reduce((a,b)=>a+b,0),average:present.length?present.reduce((a,b)=>a+b,0)/present.length:0}}).filter(x=>x.label&&x.values.some(v=>v!=null));document.querySelector('#updated').textContent=(dates.at(-1)||'최신')+' 기준';document.querySelector('#sync').textContent='구글 시트 자동 연동';render()}catch(e){document.querySelector('#sync').textContent='연결 재시도 중';document.querySelector('#table').innerHTML='<div class="error">데이터 연결을 다시 시도하고 있습니다.</div>'}}
load();setInterval(load,60000);
</script></body></html>
